<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reaction Time</title>
  <style>
    :root {
      --bg: #faf7f2;
      --panel: #fff;
      --ink: #2b2118;
      --muted: #8a7a66;
      --wait: #d6473a;
      --go: #2cae5e;
      --early: #d68b1f;
      --shadow: 0 6px 16px rgba(60, 40, 20, 0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-user-select: none; user-select: none;
      touch-action: manipulation;
    }
    .back-link {
      position: fixed; top: 12px; left: 12px; z-index: 60;
      background: var(--panel); color: var(--muted);
      text-decoration: none; font-size: 0.82rem;
      padding: 6px 12px; border-radius: 999px;
      box-shadow: var(--shadow);
    }
    .back-link:hover { color: var(--ink); }

    .stage {
      min-height: 100vh;
      display: grid; place-items: center;
      padding: 16px;
    }
    .pad {
      width: 100%; max-width: 720px;
      aspect-ratio: 4 / 3;
      border-radius: 24px;
      background: var(--wait);
      color: #fff;
      display: grid; place-items: center;
      cursor: pointer;
      transition: background 80ms ease;
      box-shadow: 0 18px 40px rgba(60, 40, 20, 0.18);
      text-align: center;
    }
    .pad.go { background: var(--go); }
    .pad.early { background: var(--early); }
    .pad.idle { background: #6a6a6a; }
    .pad.result { background: #2c4a76; }
    .pad h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    .pad p {
      margin: 0;
      opacity: 0.85;
      font-size: clamp(1rem, 2vw, 1.15rem);
    }
    .stats {
      margin-top: 18px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 0.95rem;
      display: flex; gap: 18px; flex-wrap: wrap;
      justify-content: center;
    }
    .stats b { color: var(--ink); }
  </style>
</head>
<body>
  <a class="back-link" href="../../">← arcade</a>
  <div class="stage">
    <div>
      <div class="pad idle" id="pad" role="button" tabindex="0">
        <div>
          <h1 id="title">Reaction Time</h1>
          <p id="sub">Tap to start.</p>
        </div>
      </div>
      <div class="stats">
        <span>Last: <b id="last">—</b></span>
        <span>Best: <b id="best">—</b></span>
        <span>Avg (last 5): <b id="avg">—</b></span>
      </div>
    </div>
  </div>

  <script>
  (() => {
    const KEY = 'reaction.v1';
    const pad = document.getElementById('pad');
    const title = document.getElementById('title');
    const sub = document.getElementById('sub');
    const lastEl = document.getElementById('last');
    const bestEl = document.getElementById('best');
    const avgEl = document.getElementById('avg');

    let state = { history: [], best: null };
    try {
      const s = JSON.parse(localStorage.getItem(KEY) || '{}');
      if (Array.isArray(s.history)) state.history = s.history;
      if (typeof s.best === 'number') state.best = s.best;
    } catch {}

    let phase = 'idle'; // idle | waiting | go | result | early
    let waitTimer = null;
    let goAt = 0;

    function setPad(cls, t, s) {
      pad.classList.remove('idle','go','early','result');
      pad.classList.add(cls);
      title.textContent = t;
      sub.textContent = s;
    }

    function start() {
      phase = 'waiting';
      setPad('', 'Wait for green…', 'Don’t click yet.');
      pad.classList.remove('idle');
      const delay = 900 + Math.random() * 2600;
      waitTimer = setTimeout(() => {
        phase = 'go';
        goAt = performance.now();
        setPad('go', 'CLICK!', 'Now!');
      }, delay);
    }

    function clicked() {
      if (phase === 'idle' || phase === 'result' || phase === 'early') {
        start();
        return;
      }
      if (phase === 'waiting') {
        clearTimeout(waitTimer);
        phase = 'early';
        setPad('early', 'Too early!', 'Tap to try again.');
        return;
      }
      if (phase === 'go') {
        const ms = Math.round(performance.now() - goAt);
        recordResult(ms);
        phase = 'result';
        const flavor = ms < 200 ? 'Lightning fingers.' :
                       ms < 280 ? 'Quick.' :
                       ms < 380 ? 'Solid.' :
                       ms < 500 ? 'Not bad.' : 'Coffee?';
        setPad('result', ms + ' ms', flavor + ' Tap to go again.');
      }
    }

    function recordResult(ms) {
      state.history.push(ms);
      if (state.history.length > 50) state.history.shift();
      if (state.best == null || ms < state.best) state.best = ms;
      try { localStorage.setItem(KEY, JSON.stringify(state)); } catch {}
      renderStats();
    }

    function renderStats() {
      const h = state.history;
      lastEl.textContent = h.length ? h[h.length - 1] + 'ms' : '—';
      bestEl.textContent = state.best != null ? state.best + 'ms' : '—';
      const last5 = h.slice(-5);
      avgEl.textContent = last5.length ? Math.round(last5.reduce((a,b)=>a+b,0)/last5.length) + 'ms' : '—';
    }

    pad.addEventListener('pointerdown', clicked);
    pad.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); clicked(); }
    });

    renderStats();
  })();
  </script>
</body>
</html>

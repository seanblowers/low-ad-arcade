<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Match</title>
  <style>
    :root {
      --bg: #fff5f1;
      --panel: #fff;
      --ink: #3a221c;
      --muted: #a78073;
      --accent: #ff7a5c;
      --card-back: #ffd8c8;
      --card-front: #fff;
      --shadow: 0 8px 22px rgba(150, 70, 40, 0.10);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(900px 500px at 110% -10%, #ffd9c8 0%, transparent 55%),
        radial-gradient(700px 500px at -10% 110%, #ffe6d8 0%, transparent 55%),
        var(--bg);
      color: var(--ink);
      -webkit-user-select: none; user-select: none;
    }
    .back-link {
      position: fixed; top: 12px; left: 12px; z-index: 60;
      background: var(--panel); color: var(--muted);
      text-decoration: none; font-size: 0.82rem;
      padding: 6px 12px; border-radius: 999px; box-shadow: var(--shadow);
    }
    .wrap { min-height: 100vh; display: grid; place-items: center; padding: 60px 16px; }
    .card-shell { background: var(--panel); padding: 22px; border-radius: 22px; box-shadow: var(--shadow); width: min(540px, 100%); text-align: center; }
    h1 { margin: 0 0 4px; font-size: 1.5rem; }
    .sub { color: var(--muted); margin: 0 0 14px; font-size: 0.92rem; min-height: 1.4em; }

    .grid { display: grid; gap: 8px; }

    .tile {
      aspect-ratio: 3 / 4;
      border-radius: 12px;
      cursor: pointer;
      perspective: 800px;
    }
    .tile-inner {
      position: relative; width: 100%; height: 100%;
      transform-style: preserve-3d;
      transition: transform 380ms cubic-bezier(.4, .2, .2, 1);
    }
    .tile.flipped .tile-inner { transform: rotateY(180deg); }
    .tile .face {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      border-radius: 12px;
      backface-visibility: hidden;
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    }
    .tile .back {
      background: linear-gradient(160deg, #ffb39b, #ff7a5c);
      color: #fff;
      font-weight: 800;
    }
    .tile .front {
      background: var(--card-front);
      transform: rotateY(180deg);
    }
    .tile.matched .tile-inner { transform: rotateY(180deg); }
    .tile.matched .front {
      animation: match 600ms ease;
      background: #fff7ee;
    }
    @keyframes match {
      0% { transform: rotateY(180deg) scale(1); }
      40% { transform: rotateY(180deg) scale(1.12); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 14px; }
    .stat { background: #fff5ee; border-radius: 10px; padding: 8px; }
    .stat .v { font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat .k { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.06em; }

    .row { display: flex; gap: 8px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
    button.btn {
      background: #fff5ee; border: 0; border-radius: 999px; padding: 8px 14px;
      font: inherit; font-size: 0.85rem; cursor: pointer; color: var(--ink);
    }
    button.btn:hover { background: #ffeadd; }
    button.btn.primary { background: var(--accent); color: #fff; font-weight: 700; }
    button.btn.primary:hover { background: #f06b4d; }

    .toggle { display: flex; gap: 6px; justify-content: center; margin-top: 8px; }
    .toggle .opt { background: #fff5ee; padding: 4px 10px; border-radius: 999px; font-size: 0.78rem; cursor: pointer; color: var(--muted); }
    .toggle .opt.active { background: var(--accent); color: #fff; font-weight: 700; }
  </style>
</head>
<body>
  <a class="back-link" href="../../">← arcade</a>
  <div class="wrap">
    <div class="card-shell">
      <h1>Memory Match</h1>
      <p class="sub" id="sub">Find every pair.</p>
      <div class="grid" id="grid"></div>
      <div class="stats">
        <div class="stat"><div class="v" id="moves">0</div><div class="k">moves</div></div>
        <div class="stat"><div class="v" id="time">0s</div><div class="k">time</div></div>
        <div class="stat"><div class="v" id="best">—</div><div class="k">best moves</div></div>
      </div>
      <div class="toggle">
        <span class="opt" data-d="easy">easy (4×3)</span>
        <span class="opt active" data-d="medium">medium (4×4)</span>
        <span class="opt" data-d="hard">hard (6×4)</span>
      </div>
      <div class="row">
        <button class="btn primary" id="newBtn">New game</button>
      </div>
    </div>
  </div>

  <script>
  (() => {
    const KEY = 'memorymatch.v1';
    const SYMS = ['🐰','🌸','🍓','🌙','🍄','🐝','🦊','🌻','🐢','🦋','🍋','🐌','🐸','🐳','🍒','🌵'];
    const DIFFS = {
      easy:   { cols: 4, rows: 3 },
      medium: { cols: 4, rows: 4 },
      hard:   { cols: 6, rows: 4 },
    };

    const grid = document.getElementById('grid');
    const movesEl = document.getElementById('moves');
    const timeEl = document.getElementById('time');
    const bestEl = document.getElementById('best');
    const sub = document.getElementById('sub');

    let stats = { best: {}, difficulty: 'medium' };
    try { Object.assign(stats, JSON.parse(localStorage.getItem(KEY) || '{}')); } catch {}
    document.querySelectorAll('.toggle .opt').forEach(o => {
      o.classList.toggle('active', o.dataset.d === stats.difficulty);
      o.addEventListener('click', () => {
        stats.difficulty = o.dataset.d;
        document.querySelectorAll('.toggle .opt').forEach(x => x.classList.toggle('active', x === o));
        save(); newGame();
      });
    });

    let tiles = [];
    let first = null;
    let lock = false;
    let moves = 0;
    let started = 0;
    let matched = 0;
    let timer = null;

    function save() { try { localStorage.setItem(KEY, JSON.stringify(stats)); } catch {} }

    function newGame() {
      const { cols, rows } = DIFFS[stats.difficulty];
      const pairs = (cols * rows) / 2;
      const chosen = SYMS.slice(0, pairs);
      const deck = [...chosen, ...chosen].sort(() => Math.random() - 0.5);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.innerHTML = '';
      tiles = [];
      first = null; lock = false; moves = 0; matched = 0;
      started = 0;
      sub.textContent = 'Find every pair.';
      clearInterval(timer);
      timeEl.textContent = '0s';
      for (const sym of deck) {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<div class="tile-inner"><div class="face back">?</div><div class="face front">${sym}</div></div>`;
        t.dataset.sym = sym;
        t.addEventListener('click', () => flip(t));
        tiles.push(t);
        grid.appendChild(t);
      }
      const best = stats.best[stats.difficulty];
      bestEl.textContent = best != null ? best : '—';
      movesEl.textContent = '0';
    }

    function flip(t) {
      if (lock || t.classList.contains('flipped') || t.classList.contains('matched')) return;
      if (!started) {
        started = performance.now();
        timer = setInterval(() => {
          timeEl.textContent = Math.floor((performance.now() - started) / 1000) + 's';
        }, 250);
      }
      t.classList.add('flipped');
      if (!first) { first = t; return; }
      moves++; movesEl.textContent = moves;
      if (first.dataset.sym === t.dataset.sym) {
        first.classList.add('matched');
        t.classList.add('matched');
        first = null;
        matched++;
        if (matched === tiles.length / 2) win();
      } else {
        lock = true;
        const a = first, b = t;
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          first = null; lock = false;
        }, 800);
      }
    }

    function win() {
      clearInterval(timer);
      const best = stats.best[stats.difficulty];
      if (best == null || moves < best) {
        stats.best[stats.difficulty] = moves;
        save();
        bestEl.textContent = moves;
        sub.textContent = `New best — ${moves} moves! 🎉`;
      } else {
        sub.textContent = `Done in ${moves} moves.`;
      }
    }

    document.getElementById('newBtn').addEventListener('click', newGame);
    newGame();
  })();
  </script>
</body>
</html>
